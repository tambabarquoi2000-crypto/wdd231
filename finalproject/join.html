    <main>
       <form method="get" action="sucessful.html">
            <div>
                <h1>Sign up</h1>
                <div id="msg"></div>
                <label for="fname">First Name<span class="required">*</span>
                    <input type="text" id="fname" name="fname" required autocomplete="given-name" title="First Name">
                </label>
                <label for="lname">Last Name<span class="required">*</span>
                    <input type="text" id="lname" name="lname" required autocomplete="family-name" title="Last Name">
                </label>
                <label for="email">Email
                    <input type="email" id="email" name="email" placeholder="someone@gmail.com" required>
                </label>
                <label for="password">Password 
                    <input type="password" id="password" name="password" required>
                </label>
                
                <input type="hidden" name="timestamp" id="time-stamp" title="timestamp">
                <button type="submit">Join</button>
            </div>      
        </form>
    </main>
